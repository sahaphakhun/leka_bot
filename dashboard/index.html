    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTYiIGZpbGw9IiMyNTYzZWIiLz4KPHBhdGggZD0iTTE2IDhjLTIuMjA5IDEuMTA0LTMuNTM2IDMuMzQ0LTMuNTM2IDUuOTM2IDAgMi41OTIgMS4zMjcgNC44MzIgMy41MzYgNS45MzZDMjAuNDczIDE4LjY2OCAyMS44IDIwLjkwOCAyMS44IDIzLjVjMCAyLjU5Mi0xLjMyNyA0LjgzMi0zLjUzNiA1LjkzNkMxNC42NzMgMjguMzMyIDEzLjMzNiAyNi4wOTIgMTMuMzM2IDIzLjVjMC0yLjU5MiAxLjMzNy00LjgzMiAzLjUzNi01LjkzNkMxOS4zNzMgMTYuNjY4IDIwLjcgMTQuNDI4IDIwLjcgMTEuODM2YzAtMi41OTItMS4zMjctNC44MzItMy41MzYtNS45MzZaIiBmaWxsPSJ3aGl0ZSIvPgo8L3N2Zz4K">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="assets/moment.min.js"></script>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/base.css">

    <!-- Custom CSS for specific components -->
    <style>
        /* Enhanced error handling */
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 2rem;
        }
        
        .error-message {
            text-align: center;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(229, 229, 229, 0.8);
        }
        
        .setup-instructions {
            text-align: left;
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            border-left: 4px solid #6366f1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .setup-instructions h3 {
            margin-bottom: 1rem;
            color: #171717;
        }
        
        .setup-instructions ol {
            margin-left: 1.5rem;
        }
        
        .setup-instructions li {
            margin-bottom: 0.5rem;
            color: #525252;
        }
        
        .error-message-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 2rem;
        }
        
        .error-message-container .error-message {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.25rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(229, 229, 229, 0.8);
        }
        
        .error-message-container .error-message i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }
        
        .error-message-container .error-message h3 {
            color: #ef4444;
            margin-bottom: 1rem;
        }
        
        .error-message-container .error-message p {
            color: #525252;
            margin-bottom: 1.5rem;
        }
        
        /* Enhanced loading states */
        .loading-overlay {
            background: rgba(255, 255, 255, 0.98) !important;
            backdrop-filter: blur(20px) !important;
        }
        
        .loading-spinner {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px) !important;
            border-radius: 1.5rem !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            border: 1px solid rgba(229, 229, 229, 0.8) !important;
        }
        
        /* Enhanced focus states */
        .btn:focus,
        .nav-item:focus,
        .group-selector:focus {
            outline: 2px solid #6366f1 !important;
            outline-offset: 2px !important;
        }
        
        /* Smooth animations */
        .view {
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        
        .view.active {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
        
        /* Enhanced mobile experience */
        @media (max-width: 768px) {
            .header-left .group-selector span {
                display: none;
            }
            
            .user-info {
                display: none;
            }
            
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            /* Improved mobile spacing */
            .main-content {
                padding: 1rem !important;
            }
            
            .view-header {
                margin-bottom: 1.5rem !important;
            }
            
            .stats-grid {
                gap: 1rem !important;
            }
            
            .dashboard-grid {
                gap: 1.5rem !important;
            }
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Better touch targets */
        @media (max-width: 768px) {
            .btn {
                min-height: 48px !important;
            }
            
            .nav-item {
                min-height: 52px !important;
            }
            
            .bottom-nav-item {
                min-height: 64px !important;
            }
            
            .group-selector {
                min-height: 48px !important;
            }
        }
        
        /* Enhanced accessibility */
        .btn:focus-visible,
        .nav-item:focus-visible,
        .group-selector:focus-visible {
            outline: 2px solid #6366f1 !important;
            outline-offset: 2px !important;
        }
        
        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .btn,
            .nav-item,
            .dashboard-section,
            .stat-card {
                border-width: 2px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p class="text-reveal">กำลังโหลด...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo hover-scale">
                    <i class="fas fa-robot"></i>
                    <span>Leka Bot</span>
                </div>
                <div class="group-selector hover-lift" id="groupSelector">
                    <i class="fas fa-users"></i>
                    <span id="currentGroupName">กำลังโหลด...</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="notificationsBtn" title="การแจ้งเตือน">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationCount" style="display: none;">0</span>
                </button>
                <button class="btn-icon" id="menuToggle" title="เมนู">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="user-menu" id="userMenu">
                    <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTYiIGZpbGw9IiNFNUU3RUIiLz4KPHBhdGggZD0iTTE2IDhjLTIuMjA5IDEuMTA0LTMuNTM2IDMuMzQ0LTMuNTM2IDUuOTM2IDAgMi41OTIgMS4zMjcgNC44MzIgMy41MzYgNS45MzZDMjAuNDczIDE4LjY2OCAyMS44IDIwLjkwOCAyMS44IDIzLjVjMCAyLjU5Mi0xLjMyNyA0LjgzMi0zLjUzNiA1LjkzNkMxNC42NzMgMjguMzMyIDEzLjMzNiAyNi4wOTIgMTMuMzM2IDIzLjVjMC0yLjU5MiAxLjMzNy00LjgzMiAzLjUzNi01LjkzNkMxOS4zNzMgMTYuNjY4IDIwLjcgMTQuNDI4IDIwLjcgMTEuODM2YzAtMi41OTItMS4zMjctNC44MzItMy41MzYtNS45MzZaIiBmaWxsPSIjOUNBM0E2Ii8+Cjwvc3ZnPgo=" alt="User Avatar" class="user-avatar" id="userAvatar">
                    <div class="user-info">
                        <div class="user-name" id="userName">ผู้ใช้</div>
                        <div class="user-role" id="userRole">สมาชิก</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active hover-lift" data-view="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>แดชบอร์ด</span>
                </a>
                <a href="#" class="nav-item hover-lift" data-view="calendar">
                    <i class="fas fa-calendar-alt"></i>
                    <span>ปฏิทิน</span>
                </a>
                <a href="#" class="nav-item hover-lift" data-view="tasks">
                    <i class="fas fa-tasks"></i>
                    <span>งาน</span>
                </a>
                <a href="#" class="nav-item hover-lift" data-view="files">
                    <i class="fas fa-folder"></i>
                    <span>ไฟล์</span>
                </a>
                <a href="#" class="nav-item hover-lift" data-view="leaderboard">
                    <i class="fas fa-trophy"></i>
                    <span>อันดับ</span>
                </a>
                <a href="#" class="nav-item hover-lift" data-view="reports">
                    <i class="fas fa-chart-bar"></i>
                    <span>รายงาน</span>
                </a>
                <a href="#" class="nav-item hover-lift" data-view="recurring">
                    <i class="fas fa-rotate"></i>
                    <span>งานประจำ</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">ผู้ใช้</div>
                    <div class="user-role" id="sidebarUserRole">สมาชิก</div>
                </div>
            </div>
        </aside>

        <!-- Sidebar Overlay for Mobile -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard View -->
            <div id="dashboardView" class="view active">
                <div class="view-header">
                    <h2 class="text-reveal">แดชบอร์ด</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary btn-ripple" id="addTaskBtn">
                            <i class="fas fa-plus"></i>
                            <span class="btn-text">เพิ่มงาน</span>
                        </button>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid" id="statsGrid">
                    <!-- Stats will be loaded here -->
                </div>

                <!-- Dashboard Grid -->
                <div class="dashboard-grid">
                    <div class="dashboard-section hover-lift">
                        <div class="section-header">
                            <h3 class="text-reveal">งานที่ใกล้ครบกำหนด</h3>
                            <a href="#" class="section-link hover-scale" onclick="dashboardInstance.switchView('tasks')">ดูทั้งหมด</a>
                        </div>
                        <div id="upcomingTasks">
                            <!-- Upcoming tasks will be loaded here -->
                        </div>
                    </div>

                    <div class="dashboard-section hover-lift">
                        <div class="section-header">
                            <h3 class="text-reveal">อันดับประจำสัปดาห์</h3>
                            <a href="#" class="section-link hover-scale" onclick="dashboardInstance.switchView('leaderboard')">ดูทั้งหมด</a>
                        </div>
                        <div id="miniLeaderboard">
                            <!-- Mini leaderboard will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Calendar View -->
            <div id="calendarView" class="view">
                <div class="view-header">
                    <h2 class="text-reveal">ปฏิทิน</h2>
                    <div class="view-actions">
                        <button class="btn btn-outline hover-scale" id="prevMonth">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="currentMonthYear">เดือนปัจจุบัน</span>
                        <button class="btn btn-outline hover-scale" id="nextMonth">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="calendar-container">
                    <div id="calendarGrid">
                        <!-- Calendar will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- Tasks View -->
            <div id="tasksView" class="view">
                <div class="view-header">
                    <h2 class="text-reveal">งาน</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary btn-ripple" id="addTaskBtn2">
                            <i class="fas fa-plus"></i>
                            <span class="btn-text">เพิ่มงาน</span>
                        </button>
                    </div>
                </div>
                <div class="tasks-container">
                    <div id="tasksList">
                        <!-- Tasks will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Files View -->
            <div id="filesView" class="view">
                <div class="view-header">
                    <h2 class="text-reveal">ไฟล์</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary btn-primary btn-ripple" id="uploadFileBtn">
                            <i class="fas fa-upload"></i>
                            <span class="btn-text">อัปโหลด</span>
                        </button>
                    </div>
                </div>
                <div class="files-container">
                    <div id="filesGrid">
                        <!-- Files will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Leaderboard View -->
            <div id="leaderboardView" class="view">
                <div class="view-header">
                    <h2 class="text-reveal">อันดับ</h2>
                    <div class="view-actions">
                        <div class="btn-group">
                            <button class="btn btn-outline active hover-scale" data-period="weekly">สัปดาห์</button>
                            <button class="btn btn-outline hover-scale" data-period="monthly">เดือน</button>
                            <button class="btn btn-outline hover-scale" data-period="all_time">ตลอดกาล</button>
                        </div>
                    </div>
                </div>
                <div class="leaderboard-container">
                    <div id="leaderboardList">
                        <!-- Leaderboard will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Reports View -->
            <div id="reportsView" class="view">
                <div class="view-header">
                    <h2 class="text-reveal">รายงาน</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary btn-ripple" id="generateReportBtn">
                            <i class="fas fa-download"></i>
                            <span class="btn-text">สร้างรายงาน</span>
                        </button>
                    </div>
                </div>
                <div class="reports-container">
                    <div id="reportsContent">
                        <!-- Reports will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Recurring View -->
            <div id="recurringView" class="view">
                <div class="view-header">
                    <h2 class="text-reveal">งานประจำ</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary btn-ripple" id="addRecurringBtn">
                            <i class="fas fa-plus"></i>
                            <span class="btn-text">เพิ่มงานประจำ</span>
                        </button>
                    </div>
                </div>
                <div class="tasks-container">
                    <div id="recurringList"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <a href="#" class="bottom-nav-item active hover-lift" data-view="dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>แดชบอร์ด</span>
        </a>
        <a href="#" class="bottom-nav-item hover-lift" data-view="calendar">
            <i class="fas fa-calendar-alt"></i>
            <span>ปฏิทิน</span>
        </a>
        <a href="#" class="bottom-nav-item hover-lift" data-view="tasks">
            <i class="fas fa-tasks"></i>
            <span>งาน</span>
        </a>
        <a href="#" class="bottom-nav-item hover-lift" data-view="files">
            <i class="fas fa-folder"></i>
            <span>ไฟล์</span>
        </a>
        <a href="#" class="bottom-nav-item hover-lift" data-view="leaderboard">
            <i class="fas fa-trophy"></i>
            <span>อันดับ</span>
        </a>
    </nav>

    <!-- JavaScript Files -->
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/dashboard-core.js"></script>
    <script src="js/event-handlers.js"></script>
    <script src="js/view-renderer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
