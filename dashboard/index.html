<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Dashboard - Leka Bot</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Moment.js with Timezone -->
    <script src="assets/moment.min.js"></script>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/dashboard/img/avatar-default.svg">
    
    <!-- Custom CSS for specific components -->
    <style>
        /* Additional custom styles if needed */
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 2rem;
        }
        
        .error-message {
            text-align: center;
            max-width: 500px;
        }
        
        .setup-instructions {
            text-align: left;
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 0.5rem;
            border-left: 4px solid #007bff;
        }
        
        .setup-instructions h3 {
            margin-bottom: 1rem;
            color: #495057;
        }
        
        .setup-instructions ol {
            margin-left: 1.5rem;
        }
        
        .setup-instructions li {
            margin-bottom: 0.5rem;
            color: #6c757d;
        }
        
        .error-message-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 2rem;
        }
        
        .error-message-container .error-message {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .error-message-container .error-message i {
            font-size: 3rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        
        .error-message-container .error-message h3 {
            color: #dc3545;
            margin-bottom: 1rem;
        }
        
        .error-message-container .error-message p {
            color: #6c757d;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>กำลังโหลด...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>Leka Bot</span>
                </div>
                <div class="group-selector" id="groupSelector">
                    <i class="fas fa-users"></i>
                    <span id="currentGroupName">กำลังโหลด...</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="notificationsBtn" title="การแจ้งเตือน">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationCount" style="display: none;">0</span>
                </button>
                <button class="btn-icon" id="menuToggle" title="เมนู">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="user-menu" id="userMenu">
                    <img src="/dashboard/img/avatar-default.svg" alt="User Avatar" class="user-avatar" id="userAvatar">
                    <div class="user-info">
                        <div class="user-name" id="userName">ผู้ใช้</div>
                        <div class="user-role" id="userRole">สมาชิก</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>แดชบอร์ด</span>
                </a>
                <a href="#" class="nav-item" data-view="calendar">
                    <i class="fas fa-calendar-alt"></i>
                    <span>ปฏิทิน</span>
                </a>
                <a href="#" class="nav-item" data-view="tasks">
                    <i class="fas fa-tasks"></i>
                    <span>งาน</span>
                </a>
                <a href="#" class="nav-item" data-view="files">
                    <i class="fas fa-folder"></i>
                    <span>ไฟล์</span>
                </a>
                <a href="#" class="nav-item" data-view="leaderboard">
                    <i class="fas fa-trophy"></i>
                    <span>อันดับ</span>
                </a>
                <a href="#" class="nav-item" data-view="reports">
                    <i class="fas fa-chart-bar"></i>
                    <span>รายงาน</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">ผู้ใช้</div>
                    <div class="user-role" id="sidebarUserRole">สมาชิก</div>
                </div>
            </div>
        </aside>

        <!-- Sidebar Overlay for Mobile -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard View -->
            <div id="dashboardView" class="view active">
                <div class="view-header">
                    <h2>แดชบอร์ด</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary" id="addTaskBtn">
                            <i class="fas fa-plus"></i>
                            เพิ่มงาน
                        </button>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid" id="statsGrid">
                    <!-- Stats will be loaded here -->
                </div>

                <!-- Dashboard Grid -->
                <div class="dashboard-grid">
                    <div class="dashboard-section">
                        <div class="section-header">
                            <h3>งานที่ใกล้ครบกำหนด</h3>
                            <a href="#" class="section-link" onclick="dashboardInstance.switchView('tasks')">ดูทั้งหมด</a>
                        </div>
                        <div id="upcomingTasks">
                            <!-- Upcoming tasks will be loaded here -->
                        </div>
                    </div>

                    <div class="dashboard-section">
                        <div class="section-header">
                            <h3>อันดับประจำสัปดาห์</h3>
                            <a href="#" class="section-link" onclick="dashboardInstance.switchView('leaderboard')">ดูทั้งหมด</a>
                        </div>
                        <div id="miniLeaderboard">
                            <!-- Mini leaderboard will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Calendar View -->
            <div id="calendarView" class="view">
                <div class="view-header">
                    <h2>ปฏิทิน</h2>
                    <div class="view-actions">
                        <button class="btn btn-outline" id="prevMonth">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="currentMonthYear">เดือนปัจจุบัน</span>
                        <button class="btn btn-outline" id="nextMonth">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="calendar-container">
                    <div id="calendarGrid">
                        <!-- Calendar will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- Tasks View -->
            <div id="tasksView" class="view">
                <div class="view-header">
                    <h2>งาน</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary" id="addTaskBtn2">
                            <i class="fas fa-plus"></i>
                            เพิ่มงาน
                        </button>
                    </div>
                </div>
                <div class="tasks-container">
                    <div id="tasksList">
                        <!-- Tasks will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Files View -->
            <div id="filesView" class="view">
                <div class="view-header">
                    <h2>ไฟล์</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary" id="uploadFileBtn">
                            <i class="fas fa-upload"></i>
                            อัปโหลด
                        </button>
                    </div>
                </div>
                <div class="files-container">
                    <div id="filesGrid">
                        <!-- Files will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Leaderboard View -->
            <div id="leaderboardView" class="view">
                <div class="view-header">
                    <h2>อันดับ</h2>
                    <div class="view-actions">
                        <div class="btn-group">
                            <button class="btn btn-outline active" data-period="weekly">สัปดาห์</button>
                            <button class="btn btn-outline" data-period="monthly">เดือน</button>
                            <button class="btn btn-outline" data-period="all_time">ตลอดกาล</button>
                        </div>
                    </div>
                </div>
                <div class="leaderboard-container">
                    <div id="leaderboardList">
                        <!-- Leaderboard will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Reports View -->
            <div id="reportsView" class="view">
                <div class="view-header">
                    <h2>รายงาน</h2>
                    <div class="view-actions">
                        <button class="btn btn-primary" id="generateReportBtn">
                            <i class="fas fa-download"></i>
                            สร้างรายงาน
                        </button>
                    </div>
                </div>
                <div class="reports-container">
                    <div id="reportsContent">
                        <!-- Reports will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <a href="#" class="bottom-nav-item active" data-view="dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>แดชบอร์ด</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="calendar">
            <i class="fas fa-calendar-alt"></i>
            <span>ปฏิทิน</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="tasks">
            <i class="fas fa-tasks"></i>
            <span>งาน</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="files">
            <i class="fas fa-folder"></i>
            <span>ไฟล์</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="leaderboard">
            <i class="fas fa-trophy"></i>
            <span>อันดับ</span>
        </a>
    </nav>

    <!-- JavaScript Files -->
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/dashboard-core.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
