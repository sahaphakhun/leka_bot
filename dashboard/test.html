<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test - Leka Bot</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views.css">
    
    <style>
        .test-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .test-section {
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
        }
        
        .test-section h2 {
            margin-bottom: 1rem;
            color: #374151;
        }
        
        .test-button {
            margin: 0.5rem;
            padding: 0.5rem 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
        }
        
        .test-button:hover {
            background: #2563eb;
        }
        
        .test-result {
            margin-top: 1rem;
            padding: 1rem;
            background: #f3f4f6;
            border-radius: 0.375rem;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Dashboard Test Page</h1>
        
        <div class="test-section">
            <h2>1. ตรวจสอบ Script Loading</h2>
            <button class="test-button" onclick="testScriptLoading()">ทดสอบการโหลด Script</button>
            <div id="scriptTestResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>2. ตรวจสอบ API Service</h2>
            <button class="test-button" onclick="testApiService()">ทดสอบ API Service</button>
            <div id="apiTestResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>3. ตรวจสอบ Dashboard</h2>
            <button class="test-button" onclick="testDashboard()">ทดสอบ Dashboard</button>
            <div id="dashboardTestResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>4. ตรวจสอบ UI Components</h2>
            <button class="test-button" onclick="testUIComponents()">ทดสอบ UI Components</button>
            <div id="uiTestResult" class="test-result"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- JavaScript Files -->
    <script src="js/utils.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/dashboard-core.js"></script>
    <script src="js/event-handlers.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        function logResult(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML += message + '<br>';
            }
        }
        
        function testScriptLoading() {
            const result = document.getElementById('scriptTestResult');
            result.innerHTML = '';
            
            logResult('scriptTestResult', '🔍 ตรวจสอบการโหลด Script...');
            
            // ตรวจสอบไฟล์ที่โหลดแล้ว
            const scripts = ['utils.js', 'api-service.js', 'dashboard-core.js', 'event-handlers.js', 'main.js'];
            scripts.forEach(script => {
                const exists = document.querySelector(`script[src*="${script}"]`);
                if (exists) {
                    logResult('scriptTestResult', `✅ ${script} - โหลดแล้ว`);
                } else {
                    logResult('scriptTestResult', `❌ ${script} - ไม่พบ`);
                }
            });
            
            // ตรวจสอบ global objects
            if (window.ApiService) {
                logResult('scriptTestResult', '✅ ApiService - พร้อมใช้งาน');
            } else {
                logResult('scriptTestResult', '❌ ApiService - ไม่พบ');
            }
            
            if (window.Dashboard) {
                logResult('scriptTestResult', '✅ Dashboard - พร้อมใช้งาน');
            } else {
                logResult('scriptTestResult', '❌ Dashboard - ไม่พบ');
            }
        }
        
        function testApiService() {
            const result = document.getElementById('apiTestResult');
            result.innerHTML = '';
            
            logResult('apiTestResult', '🔍 ทดสอบ API Service...');
            
            if (!window.ApiService) {
                logResult('apiTestResult', '❌ ApiService ไม่พร้อมใช้งาน');
                return;
            }
            
            try {
                const api = new ApiService();
                logResult('apiTestResult', '✅ สร้าง ApiService instance สำเร็จ');
                
                // ทดสอบ methods
                const methods = ['getUserInfo', 'getGroupInfo', 'getStats', 'loadStats'];
                methods.forEach(method => {
                    if (typeof api[method] === 'function') {
                        logResult('apiTestResult', `✅ ${method}() - พร้อมใช้งาน`);
                    } else {
                        logResult('apiTestResult', `❌ ${method}() - ไม่พบ`);
                    }
                });
                
            } catch (error) {
                logResult('apiTestResult', `❌ เกิดข้อผิดพลาด: ${error.message}`);
            }
        }
        
        function testDashboard() {
            const result = document.getElementById('dashboardTestResult');
            result.innerHTML = '';
            
            logResult('dashboardTestResult', '🔍 ทดสอบ Dashboard...');
            
            if (!window.Dashboard) {
                logResult('dashboardTestResult', '❌ Dashboard class ไม่พร้อมใช้งาน');
                return;
            }
            
            try {
                const dashboard = new Dashboard();
                logResult('dashboardTestResult', '✅ สร้าง Dashboard instance สำเร็จ');
                
                // ทดสอบ methods
                const methods = ['switchView', 'loadStats', 'showToast', 'openModal'];
                methods.forEach(method => {
                    if (typeof dashboard[method] === 'function') {
                        logResult('dashboardTestResult', `✅ ${method}() - พร้อมใช้งาน`);
                    } else {
                        logResult('dashboardTestResult', `❌ ${method}() - ไม่พบ`);
                    }
                });
                
                // ทดสอบ toast
                dashboard.showSuccessMessage('ทดสอบ Toast Message');
                logResult('dashboardTestResult', '✅ แสดง Toast Message สำเร็จ');
                
            } catch (error) {
                logResult('dashboardTestResult', `❌ เกิดข้อผิดพลาด: ${error.message}`);
            }
        }
        
        function testUIComponents() {
            const result = document.getElementById('uiTestResult');
            result.innerHTML = '';
            
            logResult('uiTestResult', '🔍 ทดสอบ UI Components...');
            
            // ตรวจสอบ CSS classes
            const testDiv = document.createElement('div');
            testDiv.className = 'btn btn-primary';
            document.body.appendChild(testDiv);
            
            const styles = window.getComputedStyle(testDiv);
            const hasButtonStyles = styles.backgroundColor !== 'rgba(0, 0, 0, 0)' || 
                                  styles.padding !== '0px';
            
            if (hasButtonStyles) {
                logResult('uiTestResult', '✅ CSS Styles - โหลดแล้ว');
            } else {
                logResult('uiTestResult', '❌ CSS Styles - ไม่โหลด');
            }
            
            document.body.removeChild(testDiv);
            
            // ตรวจสอบ Font Awesome
            const iconTest = document.createElement('i');
            iconTest.className = 'fas fa-check';
            document.body.appendChild(iconTest);
            
            const iconStyles = window.getComputedStyle(iconTest, '::before');
            const hasIcons = iconStyles.content !== 'none';
            
            if (hasIcons) {
                logResult('uiTestResult', '✅ Font Awesome Icons - พร้อมใช้งาน');
            } else {
                logResult('uiTestResult', '❌ Font Awesome Icons - ไม่โหลด');
            }
            
            document.body.removeChild(iconTest);
            
            // ตรวจสอบ Toast Container
            const toastContainer = document.getElementById('toastContainer');
            if (toastContainer) {
                logResult('uiTestResult', '✅ Toast Container - พร้อมใช้งาน');
            } else {
                logResult('uiTestResult', '❌ Toast Container - ไม่พบ');
            }
        }
        
        // Auto-run tests when page loads
        window.addEventListener('load', function() {
            setTimeout(() => {
                testScriptLoading();
                setTimeout(() => {
                    testApiService();
                    setTimeout(() => {
                        testDashboard();
                        setTimeout(() => {
                            testUIComponents();
                        }, 500);
                    }, 500);
                }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
